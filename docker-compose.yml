version: '3.8'

services:
  pdks-app:
    build: .
    container_name: pdks_app
    ports:
      # Sunucunun localhost'unda 3005 portunu, içerideki 3000 portuna bağlar.
      # Cloudflare üzerinden http://127.0.0.1:3005 hedefine yönlendirme yapacaksınız.
      - '127.0.0.1:3005:3000'
    environment:
      # Coolify veya sistem ortamından gelecek değişkenler
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
      - VITE_FIREBASE_DATABASE_ID=${VITE_FIREBASE_DATABASE_ID}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
